name: macOS VNC with Bore Tunnel

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install TigerVNC (More Reliable)
        run: |
          brew install tigervnc

      - name: Set VNC Password
        run: |
          # Create .vnc directory
          mkdir -p ~/.vnc
          # Set password using vncpasswd
          echo "${{ secrets.VNC_PASSWORD }}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          chmod 700 ~/.vnc

      - name: Start VNC Server
        run: |
          # Kill any existing VNC sessions
          vncserver -kill :1 2>/dev/null || true
          
          # Start new VNC session on display :1
          vncserver :1 -geometry 1366x768 -depth 24 -localhost no
          
          # Wait for VNC to start
          sleep 5
          
          # Verify VNC is running
          ps aux | grep vnc

      - name: Install Bore
        run: |
          brew install bore-cli

      - name: Expose VNC via Bore Tunnel
        id: tunnel
        run: |
          # Bore tunnel on VNC port 5901 (display :1 uses port 5901)
          bore local 5901 --to bore.pub 2>&1 | tee bore.log &
          sleep 10
          cat bore.log
          TUNNEL_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -1)
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Keep Connection Alive
        run: |
          echo "=========================================="
          echo "✅ macOS VNC READY"
          echo "=========================================="
          echo "Server: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "Password: ${{ secrets.VNC_PASSWORD }}"
          echo "=========================================="
          echo ""
          echo "IMPORTANT: Use these settings in your VNC client:"
          echo "  - Server: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "  - Password: ${{ secrets.VNC_PASSWORD }}"
          echo "  - Encryption: Prefer Off"
          echo "  - Username: (leave blank)"
          echo ""
          echo "Connect using: vnc://${{ steps.tunnel.outputs.tunnel_url }}"
          echo "=========================================="
          
          while true; do 
            echo "Session active - $(date)"
            sleep 300
          done
