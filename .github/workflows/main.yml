name: macOS VNC with Bore Tunnel

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Bore (Fixed URL)
        run: |
          # Download from correct GitHub releases URL
          curl -L -o bore https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin
          chmod +x bore
          sudo mv bore /usr/local/bin/
          # Verify it works
          /usr/local/bin/bore --version || echo "Checking bore"

      - name: Start VNC Server
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpw -vncpw ${{ secrets.VNC_PASSWORD }} \
            -restart -agent -allowAccessFor -allUsers

      - name: Expose VNC via Bore Tunnel
        id: tunnel
        run: |
          /usr/local/bin/bore local 5900 --to bore.pub 2>&1 | tee bore.log &
          sleep 10
          cat bore.log
          TUNNEL_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -1 || echo "")
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Keep Connection Alive
        run: |
          echo "=========================================="
          echo "✅ macOS VNC READY"
          echo "=========================================="
          echo "Server: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "Password: ${{ secrets.VNC_PASSWORD }}"
          echo "=========================================="
          while true; do sleep 60; done
